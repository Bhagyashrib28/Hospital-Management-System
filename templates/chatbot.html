{% extends "base.html" %}

{% block content %}
<style>
    /* Specific Chatbot Dashboard Styling */
    .chat-wrapper {
        max-width: 900px;
        margin: 20px auto;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 75vh;
    }
    .chat-header {
        background: #004a99;
        color: white;
        padding: 15px;
        text-align: center;
    }
    #chat-box {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        background: #f9f9f9;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .msg { padding: 12px 18px; border-radius: 15px; max-width: 75%; line-height: 1.4; position: relative; }
    .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
    .bot { align-self: flex-start; background: #e9ecef; color: #2c3e50; border-bottom-left-radius: 2px; }
    .input-area { padding: 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
    #user-input { flex: 1; border-radius: 8px; }
</style>

<div class="chat-wrapper">
    <div class="chat-header">
        <h2 class="h4 mb-0">Medical Assistant</h2>
        <small>Describe symptoms or ask about hospital services</small>
    </div>
    
    <div id="chat-box">
        <div class="msg bot">Hello! I am the City Hospital AI. How can I assist you today?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" class="form-control" placeholder="Type your symptoms here..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()" class="btn btn-primary">Send</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if(!message) return;

        appendMsg('user', message);
        input.value = '';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            appendMsg('bot', data.response);
        } catch (e) {
            appendMsg('bot', "Connection error. Please try again.");
        }
    }

    function appendMsg(role, text) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(e) { if(e.key === 'Enter') sendMessage(); }
</script>
{% endblock %}
